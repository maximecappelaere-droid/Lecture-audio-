<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Robustesse — Olivier Hamant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --ink: #1a1a18; --paper: #f5f2ec; --moss: #3d5a3e;
    --moss-light: #5a7a5c; --rule: #ccc8c0; --muted: #7a776f;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif; padding: 24px 16px;
  }
  .card {
    background: var(--paper); border-radius: 4px;
    max-width: 560px; width: 100%; overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.55);
  }
  .header { background: var(--moss); padding: 28px 32px 24px; position: relative; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 10px; }
  .title { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1.2; color: #fff; margin-bottom: 6px; }
  .title em { font-style: italic; color: #a8c9aa; }
  .subtitle { font-size: 13px; color: rgba(255,255,255,.55); font-weight: 300; }
  .badge { position: absolute; top: 28px; right: 32px; background: rgba(255,255,255,.12); color: rgba(255,255,255,.65); font-size: 11px; font-weight: 500; letter-spacing: .05em; padding: 4px 10px; border-radius: 20px; }
  .voice-bar { background: #2a3d2b; padding: 10px 32px; display: flex; align-items: center; gap: 8px; }
  .voice-dot { width: 7px; height: 7px; border-radius: 50%; background: #a8c9aa; flex-shrink: 0; }
  .voice-info { font-size: 12px; color: rgba(255,255,255,.6); flex: 1; }
  .voice-info strong { color: #a8c9aa; font-weight: 600; }
  .body { padding: 24px 32px 28px; }
  .sentence-box {
    background: #eef3ee; border-left: 3px solid var(--moss);
    padding: 12px 14px; margin-bottom: 20px; border-radius: 0 3px 3px 0;
    font-size: 13px; color: var(--ink); line-height: 1.65;
    min-height: 56px; font-style: italic; display: none;
  }
  .sentence-box.on { display: block; }
  .timestamps { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; font-variant-numeric: tabular-nums; }
  .track { width: 100%; height: 5px; background: var(--rule); border-radius: 3px; cursor: pointer; position: relative; }
  .fill { height: 100%; background: var(--moss); border-radius: 3px; width: 0%; transition: width .2s linear; pointer-events: none; }
  .thumb { position: absolute; top: 50%; left: 0%; transform: translate(-50%,-50%); width: 14px; height: 14px; background: var(--moss); border-radius: 50%; border: 2px solid var(--paper); box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: left .2s linear; pointer-events: none; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 20px 0; }
  .btn-sec { width: 42px; height: 42px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: color .15s, background .15s; }
  .btn-sec:hover { color: var(--ink); background: rgba(0,0,0,.06); }
  .btn-play { width: 62px; height: 62px; border-radius: 50%; border: none; background: var(--moss); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 4px 18px rgba(61,90,62,.4); transition: background .15s, transform .1s; flex-shrink: 0; }
  .btn-play:hover { background: var(--moss-light); transform: scale(1.04); }
  .btn-play:active { transform: scale(.97); }
  .icon-play { margin-left: 3px; }
  .meta { display: flex; align-items: flex-start; justify-content: space-between; padding-top: 18px; border-top: 1px solid var(--rule); gap: 16px; }
  .sec-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .speed-btns { display: flex; gap: 5px; }
  .spd { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--rule); background: transparent; font-size: 12px; font-family: 'DM Sans',sans-serif; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .12s; }
  .spd:hover { border-color: var(--moss-light); color: var(--moss); }
  .spd.on { background: var(--moss); color: #fff; border-color: var(--moss); }
  .ch-section { flex: 1; min-width: 0; }
  .ch-list { list-style: none; }
  .ch-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--rule); cursor: pointer; transition: opacity .12s; }
  .ch-item:last-child { border-bottom: none; }
  .ch-item:hover { opacity: .65; }
  .ch-item.on .ch-name { color: var(--moss); font-weight: 500; }
  .ch-item.on .ch-dot { background: var(--moss); }
  .ch-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); margin-top: 5px; flex-shrink: 0; transition: background .15s; }
  .ch-name { font-size: 12px; color: var(--ink); line-height: 1.4; flex: 1; }
  .ch-time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; margin-top: 2px; flex-shrink: 0; }
  @media(max-width:440px){
    .header,.body{padding-left:20px;padding-right:20px}
    .voice-bar{padding-left:20px;padding-right:20px}
    .title{font-size:23px} .badge{display:none}
    .meta{flex-direction:column}
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="label">APM · Club Open Nord · 2025</div>
    <div class="title">La Robustesse :<br><em>3e voie du vivant</em></div>
    <div class="subtitle">Olivier Hamant — INRAE</div>
    <div class="badge">~15 min</div>
  </div>

  <div class="voice-bar">
    <div class="voice-dot"></div>
    <div class="voice-info"><strong id="voiceName">Détection de la voix…</strong></div>
  </div>

  <div class="body">
    <div class="sentence-box" id="sentBox"></div>

    <div style="margin-bottom:20px">
      <div class="timestamps"><span id="tEl">0:00</span><span id="tDur">—</span></div>
      <div class="track" id="track">
        <div class="fill" id="fill"></div>
        <div class="thumb" id="thumb"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-sec" id="bRew" title="−30s">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          <text x="8.3" y="14.6" font-size="5.2" fill="currentColor" stroke="none" font-family="DM Sans,sans-serif" font-weight="700">30</text>
        </svg>
      </button>
      <button class="btn-play" id="bPlay">
        <svg class="icon-play" id="iPlay" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
        <svg id="iPause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="btn-sec" id="bFwd" title="+30s">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
          <text x="8.3" y="14.6" font-size="5.2" fill="currentColor" stroke="none" font-family="DM Sans,sans-serif" font-weight="700">30</text>
        </svg>
      </button>
    </div>

    <div class="meta">
      <div>
        <div class="sec-title">Vitesse</div>
        <div class="speed-btns">
          <button class="spd" data-r="0.85">0.85×</button>
          <button class="spd on" data-r="1">1×</button>
          <button class="spd" data-r="1.15">1.15×</button>
          <button class="spd" data-r="1.3">1.3×</button>
        </div>
      </div>
      <div class="ch-section">
        <div class="sec-title">Chapitres</div>
        <ul class="ch-list" id="chList"></ul>
      </div>
    </div>
  </div>
</div>

<script>
// ── SCRIPT ────────────────────────────────────────────────────────────────────
const SCRIPT = [

  "Notre culte de la performance est en train de nous détruire.",
  "Et la solution n'est ni la croissance verte, ni la sobriété forcée.",
  "C'est une troisième voie — celle que le vivant pratique depuis des milliards d'années.",

  "Pour la première fois en quatre milliards et demi d'années d'histoire de la Terre, une seule espèce laisse sa trace partout.",
  "Du plastique dans le sang de tous les animaux.",
  "Des satellites en obsolescence programmée toutes les trois à cinq années.",

  "Ce n'est pas une métaphore. C'est une mesure physique.",
  "La grande accélération commence en 1950.",
  "Consommation d'eau, d'engrais, de papier, tourisme, transports — tout s'emballe en même temps.",

  "Et Olivier Hamant formule une phrase qui fait son effet : notre performance fait une guerre à la vie.",
  // 4 signaux
  "Passons maintenant aux quatre signaux faibles devenus forts.",
  "Ils se combinent et s'amplifient mutuellement.",
  "Premièrement : la pénurie de ressources naturelles.",
  "Deuxièmement : le dérèglement climatique.",
  "Hamant insiste sur le mot — pas réchauffement, mais dérèglement.",
  "Ce qui compte, ce n'est pas la moyenne qui monte, c'est l'écart type qui s'élargit.",
  "Les extrêmes, les canicules, les inondations — c'est ça qui casse les systèmes.",
  "Troisièmement : l'effondrement de la biodiversité.",
  "Soixante-dix pour cent des vertébrés disparus, quatre-vingts pour cent du volume des insectes en soixante ans.",
  "Aucun précédent dans l'histoire du vivant.",
  "Quatrièmement : les pollutions globales omniprésentes.",
  "Le rapport Meadows, publié par le Club de Rome en 1972, l'avait modélisé.",
  "Quand la courbe de population croise celle de la raréfaction des ressources, un basculement s'opère.",
  "Ce basculement, c'est maintenant.",
  "Nous sommes les générations futures que les années quatre-vingt imaginaient abstraitement.",
  "Signal d'alarme démographique : nous sommes la première génération dont les enfants vivront moins longtemps que leurs parents.",
  "L'espérance de vie en bonne santé se contracte.",
  "La population mondiale va diminuer.",
  "Ce sont des ruptures statistiques sans précédent dans l'ère industrielle.",
  // 2 voies
  "Passons à l'impasse des deux voies classiques.",
  "La première : la croissance verte, le développement durable.",
  "Le problème, c'est l'effet rebond.",
  "Les écrans plats consomment moins par unité, mais nous en avons dix fois plus.",
  "Une éolienne, c'est du béton et de l'acier — ce n'est pas neutre si elle sert à alimenter la fast fashion.",
  "Les gains d'efficacité sont annulés par l'augmentation des usages.",
  "La deuxième voie : la sobriété, le ralentissement.",
  "Le problème, selon Hamant : la sobriété imposée génère de l'ébriété.",
  "Des avions moins gourmands produisent du sur-tourisme.",
  "La sobriété doit être un résultat, pas une injonction.",
  "Alors quelle est la troisième voie ? Comment vivre dans un monde fluctuant ?",
  // 3 lois
  "Ce qui nous amène au cœur du sujet : la robustesse comme troisième voie du vivant.",
  "Olivier Hamant tire de la biologie trois lois de viabilité qui contredisent nos intuitions managériales.",
  "Première loi : le vivant est circulaire sur le long terme.",
  "Un arbre évapore cinq cents litres d'eau par jour et les restitue à l'atmosphère.",
  "L'économie circulaire n'est pas une innovation humaine récente — c'est la loi du vivant depuis des milliards d'années.",
  "Deuxième loi : le vivant joue collectif.",
  "En milieu abondant, la compétition individuelle s'exprime.",
  "En milieu appauvri, la coopération du groupe s'impose.",
  "Leçon de viabilité : l'abondance appelle la compétition, la pénurie appelle la coopération.",
  "Dans un monde de ressources contraintes, le modèle compétitif est biologiquement inadapté.",
  "Troisième loi — et c'est le cœur du propos : la robustesse se construit contre la performance.",
  "La performance, c'est l'efficacité combinée à l'efficience : atteindre l'objectif avec le moins de moyens possible.",

  "Ils acceptent l'inefficacité, l'hétérogénéité, l'erreur, l'incohérence.",
  "L'exemple du corps humain est saisissant.",
  "À trente-six virgule six degrés, notre corps n'est pas performant : il fonctionne en mode tolérance large.",
  "À quarante degrés, les enzymes sont ultra-performantes — mais le corps devient fragile et se détruit.",
  "Un avion est robuste parce qu'il vole à cinquante pour cent de ses capacités. Jamais à plein régime.",
  "Augmenter la performance épuise et fragilise le système.",
  "La phrase clé d'Olivier Hamant : le progrès du futur, c'est d'augmenter la robustesse, pas la performance.",
  // Outils
  "Passons maintenant aux outils concrets pour basculer.",
  "Premier réflexe : repenser nos mots.",
  "Bien nommer les choses, c'est habiter correctement le monde.",
  "Réchauffement climatique efface la violence du phénomène — dérèglement le traduit mieux.",
  "Il ne faut pas décarboner l'économie mais décombustionner : arrêter de brûler, pas seulement compenser.",
  "Deuxième réflexe : regarder les marges pour voir le monde qui vient.",
  "Les systèmes changent par les extrêmes, comme les nuées d'oiseaux qui bifurquent par les bords.",
  "L'agroécologie progresse chaque année depuis vingt ans en France.",
  "Les paysans les plus robustes diversifient : agroforesterie, agrotourisme. Rentables, stables, pas maximaux.",
  // Stress test
  "Troisième outil : le stress test comme boussole stratégique.",
  "Dans un monde performatif, les indicateurs construisent le projet.",
  "Dans un monde fluctuant, le projet se construit depuis les fluctuations.",
  "Méthode en trois temps.",
  "Étape un : identifier la fluctuation majeure — qu'est-ce qui pourrait se dérégler brutalement dans mon environnement ?",
  "Étape deux : identifier ce qui casse — trésorerie, réputation, chaîne de valeur, compétences clés ?",
  "Étape trois : construire dès aujourd'hui les éléments de résistance — traçabilité, diversification, coopérations de filière.",
  "Quatrième outil : l'audit interne de robustesse.",
  "Question centrale : quelles sont les contre-performances de mon entreprise, et en quoi contribuent-elles à sa robustesse ?",
  "Ce qui ressemble à une faiblesse peut être une armure.",
  // Conclusion
  "Pour conclure, voici ce que vous pouvez faire dès cette semaine.",
  "Réaliser le stress test sur votre activité principale — identifier la fluctuation qui vous ferait le plus de mal.",
  "Lister vos trois principales contre-performances et demander si elles vous protègent ou vous exposent.",
  "Consulter larobustesse point org pour des ressources et des outils communautaires.",
  "La robustesse n'est pas la résignation.",
  "C'est l'intelligence du vivant appliquée à nos organisations.",
  "Et dans un monde qui fluctue, c'est probablement le seul avantage concurrentiel durable qui reste."

const CHAPTERS = [
  { name: "Introduction",           idx: 0  },
  { name: "L'Anthropocène",         idx: 6  },
  { name: "Les quatre signaux",     idx: 16 },
  { name: "Deux voies classiques",  idx: 35 },
  { name: "Les 3 lois du vivant",   idx: 41 },
  { name: "Outils & stress test",   idx: 61 },
  { name: "Conclusion",             idx: 71 },
];

// ── VOIX ──────────────────────────────────────────────────────────────────────
// Ordre de préférence voix Apple / Google naturelles FR
const VOICE_PREF = [
  'Thomas','Amélie','Marie','Alice','Audrey','Nicolas',
  'Google français','Google French',
  'Microsoft Paul','Microsoft Julie','Microsoft Henri','Microsoft Denise',
];

let bestVoice = null;

function pickVoice() {
  const all = window.speechSynthesis.getVoices();
  const fr  = all.filter(v => v.lang && v.lang.startsWith('fr'));
  if (!fr.length) return all[0] || null;
  for (const name of VOICE_PREF) {
    const v = fr.find(v => v.name.includes(name));
    if (v) return v;
  }
  // Préférer les voix non-compact
  return fr.find(v => !v.name.toLowerCase().includes('compact')) || fr[0];
}

function initVoice() {
  bestVoice = pickVoice();
  document.getElementById('voiceName').textContent =
    bestVoice ? `Voix : ${bestVoice.name}` : 'Voix navigateur par défaut';
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const WPM   = 135;
const N     = SCRIPT.length;
let rate    = 1;
let playing = false;
let curIdx  = 0;
let tmr     = null;
let segStart= null;
let segOffset = 0; // secondes déjà écoulées avant la phrase courante

function durOf(i, r) { return (SCRIPT[i].split(/\s+/).length / WPM) * 60 / r; }
function totalDur(r) { let t=0; for(let i=0;i<N;i++) t+=durOf(i,r); return t; }
function timeUpTo(i, r) { let t=0; for(let j=0;j<i;j++) t+=durOf(j,r); return t; }
function idxAt(sec, r) {
  let t=0;
  for(let i=0;i<N;i++){const d=durOf(i,r); if(t+d>sec) return i; t+=d;}
  return N-1;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function fmt(s) { s=Math.max(0,Math.floor(s)); return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

function ui(elapsed) {
  const dur = totalDur(rate);
  const pct = Math.min(elapsed/dur*100, 100);
  document.getElementById('fill').style.width  = pct+'%';
  document.getElementById('thumb').style.left  = pct+'%';
  document.getElementById('tEl').textContent   = fmt(elapsed);
  document.getElementById('tDur').textContent  = fmt(dur);
  // Chapitres
  let active=0;
  for(let i=0;i<CHAPTERS.length;i++) if(curIdx>=CHAPTERS[i].idx) active=i;
  document.querySelectorAll('.ch-item').forEach((el,i)=>el.classList.toggle('on',i===active));
}

function showSent(i) {
  const b = document.getElementById('sentBox');
  b.textContent = SCRIPT[i]||'';
  b.classList.add('on');
}

function setIcons(isPlaying) {
  document.getElementById('iPlay').style.display  = isPlaying ? 'none' : 'block';
  document.getElementById('iPause').style.display = isPlaying ? 'block' : 'none';
}

function startTimer() {
  clearInterval(tmr);
  tmr = setInterval(()=>{
    const elapsed = timeUpTo(curIdx,rate) + (Date.now()-segStart)/1000;
    ui(elapsed);
  }, 150);
}

// ── SPEECH ────────────────────────────────────────────────────────────────────
// Pré-warm : évite le délai à la première phrase
function prewarm() {
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0;
  window.speechSynthesis.speak(u);
}

function speakFrom(i) {
  if (i >= N) { onEnd(); return; }
  curIdx   = i;
  segStart = Date.now();
  playing  = true;
  showSent(i);

  const u = new SpeechSynthesisUtterance(SCRIPT[i]);
  u.lang  = 'fr-FR';
  u.rate  = rate;
  u.pitch = 1.0;
  u.volume= 1.0;
  if (bestVoice) u.voice = bestVoice;

  // Légère pause naturelle entre phrases (virgule = 80ms, point = 150ms)
  const last = SCRIPT[i].slice(-1);
  const pause = last === '.' || last === '!' || last === '?' ? 0.15 : 0.08;

  u.onend = () => {
    if (!playing) return;
    setTimeout(()=>{ if(playing) speakFrom(i+1); }, pause*1000/rate);
  };
  u.onerror = (e) => {
    if (e.error==='interrupted'||e.error==='canceled') return;
    if (playing) speakFrom(i+1);
  };

  window.speechSynthesis.speak(u);
}

function onEnd() {
  playing = false;
  clearInterval(tmr);
  setIcons(false);
  ui(totalDur(rate));
  document.getElementById('sentBox').classList.remove('on');
}

function stop() {
  playing = false;
  window.speechSynthesis.cancel();
  clearInterval(tmr);
}

function play(fromIdx) {
  if (fromIdx !== undefined) curIdx = Math.max(0, Math.min(fromIdx, N-1));
  prewarm();
  setIcons(true);
  startTimer();
  // Petit délai pour laisser le pré-warm passer
  setTimeout(()=>speakFrom(curIdx), 80);
}

function pause() {
  stop();
  setIcons(false);
  ui(timeUpTo(curIdx, rate));
}

function seekTo(i) {
  const was = playing;
  stop();
  curIdx = Math.max(0, Math.min(i, N-1));
  ui(timeUpTo(curIdx, rate));
  if (was) play();
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('bPlay').addEventListener('click', ()=>{
  if (playing) pause(); else play();
});

document.getElementById('bRew').addEventListener('click', ()=>{
  const cur = timeUpTo(curIdx, rate);
  seekTo(idxAt(Math.max(0, cur-30), rate));
});

document.getElementById('bFwd').addEventListener('click', ()=>{
  const cur = timeUpTo(curIdx, rate);
  seekTo(idxAt(Math.min(totalDur(rate), cur+30), rate));
});

document.getElementById('track').addEventListener('click', e=>{
  const r = document.getElementById('track').getBoundingClientRect();
  const f = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
  seekTo(idxAt(f*totalDur(rate), rate));
});

document.querySelectorAll('.spd').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const was = playing, idx = curIdx;
    stop();
    rate = parseFloat(b.dataset.r);
    ui(timeUpTo(idx, rate));
    renderChapters();
    if (was) play(idx);
  });
});

// Chapitres
function renderChapters() {
  const list = document.getElementById('chList');
  list.innerHTML = '';
  CHAPTERS.forEach((ch, i)=>{
    const li = document.createElement('li');
    li.className = 'ch-item' + (i===0?' on':'');
    li.innerHTML = `<div class="ch-dot"></div><span class="ch-name">${ch.name}</span><span class="ch-time">${fmt(timeUpTo(ch.idx,rate))}</span>`;
    li.addEventListener('click', ()=>seekTo(ch.idx));
    list.appendChild(li);
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  renderChapters();
  ui(0);
  document.getElementById('tDur').textContent = fmt(totalDur(1));

  // Voix : charger immédiatement + re-détecter quand le navigateur les charge
  initVoice();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = initVoice;
  }
  // Sur iOS : forcer un getVoices pour déclencher le chargement
  window.speechSynthesis.getVoices();
}

init();
</script>
</body>
</html>
